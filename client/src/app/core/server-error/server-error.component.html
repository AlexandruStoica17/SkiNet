<div class="container mt-5">
    <h4>Internal server error - refresh the page</h4>
    <ng-container *ngIf="error">
        <h5 class="text-danger">Error, {{error.message}}</h5>
        <p class="font-weight-bold">This error comes from the server and not Angular</p> 
        <h5>stack trace</h5>
        <code class="mt-5" style="background-color: whitesmoke;">{{error.details}}</code>
    </ng-container>
</div>
